name: Build AAB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: my_secret_password_123
      KEY_PASSWORD: my_secret_password_123
      KEY_ALIAS: upload
      KEYSTORE_FILE: release.jks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        id: flutter
        with:
          channel: stable
          flutter-version: "3.24.5"

      - name: Precache Android
        run: flutter precache --android

      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "sdk.dir=${ANDROID_HOME}" >> android/local.properties
          cat android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Generate ephemeral release keystore
        run: |
          keytool -genkeypair -v \
            -keystore "android/app/${{ env.KEYSTORE_FILE }}" \
            -alias "${{ env.KEY_ALIAS }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ env.KEYSTORE_PASSWORD }}" \
            -keypass "${{ env.KEY_PASSWORD }}" \
            -dname "CN=OneUI85 Simulator, OU=CI, O=OneUI85, L=Unknown, ST=Unknown, C=US"

      - name: Create key.properties for Gradle signing
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ env.KEYSTORE_PASSWORD }}
          keyPassword=${{ env.KEY_PASSWORD }}
          keyAlias=${{ env.KEY_ALIAS }}
          storeFile=${{ env.KEYSTORE_FILE }}
          EOF

      - name: Refresh local.properties before build
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "sdk.dir=${ANDROID_HOME}" >> android/local.properties
          if ! grep -q "^flutter.sdk=." android/local.properties; then
            echo "flutter.sdk is empty — cannot build"
            exit 1
          fi
          cat android/local.properties

      - name: Build release App Bundle
        env:
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneui85-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
