name: Build APK (Release)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Regenerate Android folder (v2 embedding)
        run: |
          # احفظ ملفاتنا المخصصة
          mkdir -p _custom_android/app
          cp -r android/app/src _custom_android/app/ || true
          cp android/app/build.gradle _custom_android/app/ || true
          cp android/build.gradle _custom_android/ || true
          cp android/settings.gradle _custom_android/ || true
          cp android/gradle.properties _custom_android/ || true

          # أعد إنشاء android v2
          rm -rf android
          flutter create --platforms=android --org com.oneui85.simulator .

          # استعد ملفاتنا المخصصة
          cp -r _custom_android/app/src android/app/
          cp _custom_android/app/build.gradle android/app/
          cp _custom_android/build.gradle android/
          cp _custom_android/settings.gradle android/
          cp _custom_android/gradle.properties android/

          rm -rf _custom_android

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/app/keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneui85-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
