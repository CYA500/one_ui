plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.oneui85.simulator"
    compileSdk 35

    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.oneui85.simulator"
        minSdk 31
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            storeFile rootProject.file('app/keystore.jks')
            storePassword project.findProperty('storePassword') ?: System.getenv('STORE_PASSWORD')
            keyAlias project.findProperty('keyAlias') ?: System.getenv('KEY_ALIAS')
            keyPassword project.findProperty('keyPassword') ?: System.getenv('KEY_PASSWORD')
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
}

flutter {
    source '../..'
}
