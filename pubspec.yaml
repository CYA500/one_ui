name: oneui85_simulator
description: Samsung One UI 8.5 simulator for Android 12+
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  glassmorphism: ^3.0.0
  blur: ^4.0.0
  intl: ^0.19.0
  sensors_plus: ^5.0.1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  weather: ^3.1.1
  geolocator: ^11.1.0
  palette_generator: ^0.3.3+4
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/wallpapers/
  fonts:
    - family: SamsungOne
      fonts:
        - asset: assets/fonts/SamsungOne-400.ttf
          weight: 400
        - asset: assets/fonts/SamsungOne-700.ttf
          weight: 700
    - family: SamsungSharpSans
      fonts:
        - asset: assets/fonts/SamsungSharpSans-Bold.ttf
          weight: 700
