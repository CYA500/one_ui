name: oneui85_simulator
description: A Samsung One UI 8.5 simulator built with Flutter for Android 12+.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Animations & Effects
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  glassmorphism: ^3.0.0          # Glassmorphism UI elements
  blur: ^4.0.0                   # Blur effects
  shimmer: ^3.0.0                # Loading shimmer
  animated_text_kit: ^4.2.2      # Text animations

  # Date / Time / Intl
  intl: ^0.19.0

  # Sensors & Parallax
  sensors_plus: ^5.0.1

  # Persistence
  shared_preferences: ^2.2.3

  # Media & Permissions
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Notifications (simulation)
  flutter_local_notifications: ^17.2.1+2

  # Weather & Location
  weather: ^3.1.1
  geolocator: ^11.0.0

  # Palette extraction
  palette_generator: ^0.3.3

  # Code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/wallpapers/

  fonts:
    - family: SamsungOne
      fonts:
        - asset: assets/fonts/SamsungOne-400.ttf
          weight: 400
        - asset: assets/fonts/SamsungOne-700.ttf
          weight: 700
    - family: SamsungSharpSans
      fonts:
        - asset: assets/fonts/SamsungSharpSans-Bold.ttf
          weight: 700
